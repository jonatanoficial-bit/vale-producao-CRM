<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vale Produção Fase 11</title>
<style>
body{font-family:Arial;background:#0b1220;color:#fff;padding:20px}
.card{background:#111a2b;padding:15px;margin:10px;border-radius:10px}
button,input,select{margin:5px;padding:8px}
</style>
</head>
<body>

<h1>Vale Produção - Sistema Completo</h1>
<p>v11.0.0 | 2026-03-28 16:01:49</p>

<div class="card">
<h2>Projetos</h2>
<input id="projNome" placeholder="Nome projeto">
<input id="projData" type="date">
<button onclick="addProjeto()">Adicionar</button>
<div id="listaProjetos"></div>
</div>

<div class="card">
<h2>Financeiro</h2>
<input id="finProj" placeholder="Projeto">
<input id="finValor" type="number">
<select id="finTipo"><option>Entrada</option><option>Saída</option></select>
<button onclick="addFinance()">Salvar</button>
<div id="listaFinance"></div>
</div>

<div class="card">
<h2>Cronograma</h2>
<input id="cronProj" placeholder="Projeto">
<input id="cronDesc" placeholder="Etapa">
<input id="cronData" type="date">
<button onclick="addCron()">Salvar</button>
<div id="listaCron"></div>
</div>

<script>
let db=JSON.parse(localStorage.getItem("vale11")||'{"projetos":[],"finance":[],"cron":[]}');

function save(){localStorage.setItem("vale11",JSON.stringify(db));render();}

function addProjeto(){
db.projetos.push({nome:projNome.value,data:projData.value});
save();
}

function addFinance(){
db.finance.push({proj:finProj.value,valor:finValor.value,tipo:finTipo.value});
save();
}

function addCron(){
db.cron.push({proj:cronProj.value,desc:cronDesc.value,data:cronData.value});
save();
}

function render(){
listaProjetos.innerHTML=db.projetos.map(p=>`<div>${p.nome} - ${p.data}</div>`).join("");
listaFinance.innerHTML=db.finance.map(f=>`<div>${f.proj} - ${f.tipo} R$${f.valor}</div>`).join("");
listaCron.innerHTML=db.cron.map(c=>`<div>${c.proj} - ${c.desc} - ${c.data}</div>`).join("");
}

render();
</script>

</body>
</html>
